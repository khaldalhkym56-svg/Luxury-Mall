<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل المنتج - السوبر ماركت</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --market-green: #2ecc71;
            --market-dark: #27ae60;
            --text-dark: #2c3e50;
            --light-bg: #f4f9f4;
            --transition: all 0.3s ease;
            --shadow: 0 10px 30px rgba(46, 204, 113, 0.1);
        }

        body {
            font-family: 'Cairo', sans-serif;
            padding-top: 80px;
            background-color: var(--light-bg);
            color: var(--text-dark);
        }

        .navbar-brand span { color: var(--market-green); font-weight: 700; }

        /* مسار التنقل */
        .breadcrumb-section {
            background-color: white;
            padding: 12px 0;
            border-bottom: 1px solid #e9ecef;
            margin-bottom: 2rem;
        }
        .breadcrumb-item a { color: #6c757d; text-decoration: none; }
        .breadcrumb-item.active { color: var(--market-dark); font-weight: 700; }

        /* منطقة تفاصيل المنتج */
        .details-container {
            background: white;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: var(--shadow);
            margin-bottom: 50px;
        }

        .image-wrapper {
            background-color: #fff;
            padding: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        .image-wrapper img {
            max-width: 100%;
            max-height: 400px;
            object-fit: contain;
            border-radius: 15px;
        }

        .content-wrapper {
            padding: 40px;
            border-right: 1px solid #f1f1f1;
        }

        .fresh-label {
            background: rgba(46, 204, 113, 0.1);
            color: var(--market-dark);
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 700;
            display: inline-block;
            margin-bottom: 15px;
        }

        .product-title {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 10px;
            color: #1a1a1a;
        }

        .product-weight {
            color: #888;
            font-size: 1.1rem;
            margin-bottom: 20px;
        }

        .product-price {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--market-dark);
            margin-bottom: 25px;
        }

        .product-desc {
            line-height: 1.8;
            color: #555;
            margin-bottom: 30px;
            font-size: 1.05rem;
        }

        /* متحكم الكمية */
        .qty-box {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 35px;
            background: #f8f9fa;
            padding: 10px 20px;
            border-radius: 15px;
            width: fit-content;
        }

        .qty-btn {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            border: none;
            background: white;
            color: var(--market-dark);
            font-weight: 700;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: var(--transition);
        }

        .qty-btn:hover {
            background: var(--market-dark);
            color: white;
        }

        .qty-input {
            width: 50px;
            text-align: center;
            border: none;
            background: transparent;
            font-size: 1.2rem;
            font-weight: 700;
        }

        /* زر الإضافة للسلة */
        .btn-add-cart {
            background: linear-gradient(135deg, var(--market-green), var(--market-dark));
            color: white;
            border: none;
            padding: 16px 45px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.2rem;
            width: 100%;
            transition: var(--transition);
            box-shadow: 0 10px 20px rgba(46, 204, 113, 0.2);
        }

        .btn-add-cart:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(46, 204, 113, 0.3);
        }

        .btn-back {
            color: var(--market-dark);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .footer { background: #1a1a1a; color: white; padding: 40px 0; margin-top: 50px; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-white fixed-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">
  مول <span>الفخامة</span>
</a>
            <div class="d-flex align-items-center">
                <a href="#" class="text-dark position-relative">
                    <i class="bi bi-cart3 fs-4"></i>
                    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" id="cart-count">0</span>
                </a>
            </div>
        </div>
    </nav>

    <div class="breadcrumb-section">
        <div class="container">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-0">
                    <li class="breadcrumb-item"><a href="index.html">الرئيسية</a></li>
                    <li class="breadcrumb-item"><a href="supermarket.html">السوبر ماركت</a></li>
                    <li class="breadcrumb-item active" id="breadcrumb-product-name">تفاصيل المنتج</li>
                </ol>
            </nav>
        </div>
    </div>

    <main class="container">
        <a href="supermarket.html" class="btn-back"><i class="bi bi-arrow-right"></i> العودة للسوبر ماركت</a>

        <div class="details-container" id="product-area">
            <div class="row g-0">
                <div class="col-md-6">
                    <div class="image-wrapper">
                        <img id="item-img" src="" alt="تحميل الصورة...">
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="content-wrapper">
                        <span class="fresh-label"><i class="bi bi-patch-check-fill me-1"></i> منتج طازج ومضمون</span>
                        <h1 class="product-title" id="item-name">جاري التحميل...</h1>
                        <p class="product-weight" id="item-weight"></p>
                        
                        <div class="product-price" id="item-price">0 ر.س</div>
                        
                        <p class="product-desc" id="item-desc"></p>

                        <div class="qty-box">
                            <span class="fw-bold me-2">الكمية:</span>
                            <button class="qty-btn" onclick="changeQty(-1)"><i class="bi bi-dash"></i></button>
                            <input type="number" id="qty-input" class="qty-input" value="1" readonly>
                            <button class="qty-btn" onclick="changeQty(1)"><i class="bi bi-plus"></i></button>
                        </div>

                        <button class="btn-add-cart" onclick="addToCart()">
                            <i class="bi bi-basket3 me-2"></i> إضافة إلى السلة
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer text-center">
        <p class="mb-0">مول الفخامة - قسم السوبر ماركت &copy; 2026</p>
        <small class="text-muted">جودة طازجة تصلك أينما كنت</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        let currentItem = null;

        document.addEventListener('DOMContentLoaded', function() {
            // 1. جلب البيانات من LocalStorage
            const data = localStorage.getItem('selectedMarketItem');
            
            if (data) {
                currentItem = JSON.parse(data);
                
                // 2. تحديث العناصر في الصفحة
                document.getElementById('item-name').textContent = currentItem.name;
                document.getElementById('breadcrumb-product-name').textContent = currentItem.name;
                document.getElementById('item-price').textContent = currentItem.price.toFixed(2) + ' ر.س';
                document.getElementById('item-desc').textContent = currentItem.description;
                document.getElementById('item-img').src = currentItem.image;
                document.getElementById('item-weight').textContent = "الوزن/الحجم: " + currentItem.weight;
            } else {
                // إذا حاول المستخدم الدخول مباشرة دون اختيار منتج
                document.getElementById('product-area').innerHTML = `
                    <div class="p-5 text-center">
                        <h3>عذراً، المنتج غير موجود!</h3>
                        <a href="supermarket.html" class="btn btn-success mt-3">العودة للسوبر ماركت</a>
                    </div>`;
            }

            updateCartBadge();
        });

        // دالة تغيير الكمية
        function changeQty(amount) {
            const input = document.getElementById('qty-input');
            let val = parseInt(input.value) + amount;
            if (val >= 1) input.value = val;
        }

        // دالة الإضافة للسلة (موحدة لكل الموقع)
        function addToCart() {
            if (!currentItem) return;

            const qty = parseInt(document.getElementById('qty-input').value);
            let cart = JSON.parse(localStorage.getItem('restaurantCart')) || [];

            const existingItem = cart.find(i => i.id === currentItem.id);
            if (existingItem) {
                existingItem.quantity += qty;
            } else {
                cart.push({
                    id: currentItem.id,
                    name: currentItem.name,
                    price: currentItem.price,
                    quantity: qty
                });
            }

            localStorage.setItem('restaurantCart', JSON.stringify(cart));
            updateCartBadge();

            // تنبيه بسيط للمستخدم
            alert(`تم إضافة ${qty} من ${currentItem.name} إلى سلتك بنجاح!`);
        }

        // تحديث عداد السلة العلوي
        function updateCartBadge() {
            let cart = JSON.parse(localStorage.getItem('restaurantCart')) || [];
            const total = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cart-count').textContent = total;
        }
    </script>
</body>
</html>
